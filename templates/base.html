<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}CineMax{% endblock %} — Rạp Chiếu Phim</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0a;
            --bg2: #111111;
            --bg3: #1a1a1a;
            --surface: #1e1e1e;
            --border: #2a2a2a;
            --gold: #c9a84c;
            --gold-light: #e4c97e;
            --gold-dim: #7a6230;
            --text: #e8e2d6;
            --text-muted: #7a746a;
            --text-dim: #4a4540;
            --red: #c0392b;
            --green: #27ae60;
            --blue: #2980b9;
            --radius: 6px;
            --radius-lg: 12px;
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            line-height: 1.6;
        }

        /* ── NAV ── */
        nav {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(10, 10, 10, 0.92);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--border);
            padding: 0 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 60px;
        }

        .nav-brand {
            font-family: 'Playfair Display', serif;
            font-size: 1.4rem;
            color: var(--gold);
            text-decoration: none;
            letter-spacing: 0.02em;
        }

        .nav-brand span {
            color: var(--text-muted);
            font-style: italic;
            font-size: 0.9rem;
        }

        .nav-links {
            display: flex;
            gap: 1.5rem;
            align-items: center;
        }

        .nav-links a {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.88rem;
            font-weight: 500;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            transition: color 0.2s;
        }

        .nav-links a:hover,
        .nav-links a.active {
            color: var(--gold);
        }

        .nav-sep {
            color: var(--text-dim);
        }

        /* ── LAYOUT ── */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 2rem;
        }

        .page-header {
            padding: 3rem 0 2rem;
            border-bottom: 1px solid var(--border);
            margin-bottom: 2.5rem;
        }

        .page-title {
            font-family: 'Playfair Display', serif;
            font-size: 2.2rem;
            color: var(--text);
            line-height: 1.2;
        }

        .page-title em {
            color: var(--gold);
            font-style: italic;
        }

        .page-subtitle {
            color: var(--text-muted);
            margin-top: 0.4rem;
            font-size: 0.9rem;
        }

        /* ── BUTTONS ── */
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            padding: 0.5rem 1.1rem;
            border: 1px solid transparent;
            border-radius: var(--radius);
            font-family: 'DM Sans', sans-serif;
            font-size: 0.83rem;
            font-weight: 500;
            letter-spacing: 0.03em;
            text-transform: uppercase;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.18s;
        }

        .btn-gold {
            background: var(--gold);
            color: #0a0a0a;
            border-color: var(--gold);
        }

        .btn-gold:hover {
            background: var(--gold-light);
            border-color: var(--gold-light);
        }

        .btn-outline {
            background: transparent;
            color: var(--gold);
            border-color: var(--gold-dim);
        }

        .btn-outline:hover {
            border-color: var(--gold);
            background: rgba(201, 168, 76, 0.07);
        }

        .btn-ghost {
            background: transparent;
            color: var(--text-muted);
            border-color: var(--border);
        }

        .btn-ghost:hover {
            color: var(--text);
            border-color: var(--text-dim);
        }

        .btn-danger {
            background: transparent;
            color: var(--red);
            border-color: rgba(192, 57, 43, 0.4);
        }

        .btn-danger:hover {
            background: rgba(192, 57, 43, 0.1);
            border-color: var(--red);
        }

        .btn-sm {
            padding: 0.3rem 0.75rem;
            font-size: 0.78rem;
        }

        /* ── CARDS ── */
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            overflow: hidden;
        }

        .card-body {
            padding: 1.5rem;
        }

        /* ── TABLE ── */
        .table-wrap {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.875rem;
        }

        thead th {
            padding: 0.75rem 1rem;
            text-align: left;
            font-size: 0.72rem;
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--text-muted);
            border-bottom: 1px solid var(--border);
            background: var(--bg2);
        }

        tbody td {
            padding: 0.85rem 1rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
            color: var(--text);
            vertical-align: middle;
        }

        tbody tr:hover td {
            background: rgba(201, 168, 76, 0.03);
        }

        tbody tr:last-child td {
            border-bottom: none;
        }

        /* ── BADGES ── */
        .badge {
            display: inline-block;
            padding: 0.2rem 0.6rem;
            border-radius: 100px;
            font-size: 0.7rem;
            font-weight: 600;
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }

        .badge-gold {
            background: rgba(201, 168, 76, 0.15);
            color: var(--gold);
            border: 1px solid rgba(201, 168, 76, 0.3);
        }

        .badge-green {
            background: rgba(39, 174, 96, 0.12);
            color: #2ecc71;
            border: 1px solid rgba(39, 174, 96, 0.3);
        }

        .badge-red {
            background: rgba(192, 57, 43, 0.12);
            color: #e74c3c;
            border: 1px solid rgba(192, 57, 43, 0.3);
        }

        .badge-blue {
            background: rgba(41, 128, 185, 0.12);
            color: #3498db;
            border: 1px solid rgba(41, 128, 185, 0.3);
        }

        .badge-gray {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-muted);
            border: 1px solid var(--border);
        }

        /* ── FORMS ── */
        .form-group {
            margin-bottom: 1.25rem;
        }

        .form-label {
            display: block;
            margin-bottom: 0.4rem;
            font-size: 0.8rem;
            font-weight: 500;
            letter-spacing: 0.04em;
            text-transform: uppercase;
            color: var(--text-muted);
        }

        .form-control {
            width: 100%;
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 0.6rem 0.9rem;
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-size: 0.9rem;
            transition: border-color 0.18s;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--gold-dim);
            box-shadow: 0 0 0 3px rgba(201, 168, 76, 0.08);
        }

        select.form-control option {
            background: var(--bg2);
        }

        /* ── ALERTS / FLASH ── */
        .alerts {
            position: fixed;
            top: 70px;
            right: 1.5rem;
            z-index: 999;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .alert {
            padding: 0.75rem 1.25rem;
            border-radius: var(--radius);
            font-size: 0.875rem;
            max-width: 340px;
            animation: slideIn 0.25s ease;
            cursor: pointer;
        }

        .alert-success {
            background: rgba(39, 174, 96, 0.15);
            border: 1px solid rgba(39, 174, 96, 0.4);
            color: #2ecc71;
        }

        .alert-error {
            background: rgba(192, 57, 43, 0.15);
            border: 1px solid rgba(192, 57, 43, 0.4);
            color: #e74c3c;
        }

        @keyframes slideIn {
            from {
                transform: translateX(20px);
                opacity: 0;
            }

            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        /* ── MODAL ── */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 200;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(4px);
            align-items: center;
            justify-content: center;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal {
            background: var(--bg3);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 2rem;
            width: 90%;
            max-width: 520px;
            animation: modalIn 0.2s ease;
        }

        @keyframes modalIn {
            from {
                transform: scale(0.95);
                opacity: 0;
            }

            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        .modal-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.4rem;
            margin-bottom: 1.5rem;
            color: var(--text);
        }

        .modal-actions {
            display: flex;
            gap: 0.75rem;
            justify-content: flex-end;
            margin-top: 1.5rem;
        }

        /* ── GRID ── */
        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.25rem;
        }

        .grid-3 {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1.25rem;
        }

        .grid-4 {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1rem;
        }

        /* ── SCROLLBAR ── */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg2);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--text-dim);
        }

        /* ── UTILS ── */
        .mono {
            font-family: 'DM Mono', monospace;
            font-size: 0.82rem;
            color: var(--text-muted);
        }

        .text-gold {
            color: var(--gold);
        }

        .text-muted {
            color: var(--text-muted);
        }

        .text-sm {
            font-size: 0.85rem;
        }

        .mt-1 {
            margin-top: 0.5rem;
        }

        .mt-2 {
            margin-top: 1rem;
        }

        .mt-3 {
            margin-top: 1.5rem;
        }

        .flex {
            display: flex;
        }

        .items-center {
            align-items: center;
        }

        .justify-between {
            justify-content: space-between;
        }

        .gap-1 {
            gap: 0.5rem;
        }

        .gap-2 {
            gap: 1rem;
        }

        .divider {
            height: 1px;
            background: var(--border);
            margin: 1.5rem 0;
        }

        @media (max-width: 768px) {

            .grid-2,
            .grid-3,
            .grid-4 {
                grid-template-columns: 1fr;
            }

            .nav-links a {
                font-size: 0.75rem;
            }

            .container {
                padding: 0 1rem;
            }
        }
    </style>
    {% block head %}{% endblock %}
</head>

<body>

    <nav>
        <a href="{{ url_for('index') }}" class="nav-brand">CineMax <span>— Rạp Chiếu Phim</span></a>
        <div class="nav-links">
            <a href="{{ url_for('index') }}" {% if request.endpoint=='index' %}class="active" {% endif %}>Phim</a>
            <span class="nav-sep">·</span>
            <a href="{{ url_for('admin_dashboard') }}" {% if request.endpoint and request.endpoint.startswith('admin')
                %}class="active" {% endif %}>Admin</a>
        </div>
    </nav>

    {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
    <div class="alerts">
        {% for cat, msg in messages %}
        <div class="alert alert-{{ cat }}" onclick="this.remove()">{{ msg }}</div>
        {% endfor %}
    </div>
    <script>
        setTimeout(() => document.querySelectorAll('.alert').forEach(a => a.remove()), 4000);
    </script>
    {% endif %}
    {% endwith %}

    {% block content %}{% endblock %}

</body>

</html>
